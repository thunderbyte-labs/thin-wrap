name: Build and Release Executables

on:
  push:
    tags:
      - 'v*'  # Triggers on any tag starting with 'v'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python 3.11 and build dependencies
        run: |
          apt-get update
          apt-get install -y software-properties-common curl
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y python3.11 python3.11-venv python3.11-dev python3-pip build-essential
          python3.11 -m ensurepip --upgrade

      - name: Install Python dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install -r requirements.txt
          python3.11 -m pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          python3.11 -m PyInstaller --console --name thin-wrap --collect-submodules rich._unicode_data thin_wrap.py

      - name: Include sample config.json
        run: |
          mkdir -p dist/thin-wrap
          cp config.json dist/thin-wrap/config.json

      - name: Package Linux x86_64
        run: |
          cd dist
          zip -r ../thin-wrap-Linux-x86_64.zip thin-wrap

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: thin-wrap-Linux-x86_64.zip

  build-macos-intel:
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --console --name thin-wrap --collect-submodules rich._unicode_data thin_wrap.py

      - name: Include sample config.json
        run: |
          mkdir -p dist/thin-wrap
          cp config.json dist/thin-wrap/config.json

      - name: Package macOS x86_64
        run: |
          cd dist
          zip -r ../thin-wrap-Darwin-x86_64.zip thin-wrap

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: thin-wrap-Darwin-x86_64.zip

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --console --name thin-wrap --collect-submodules rich._unicode_data thin_wrap.py

      - name: Include sample config.json
        run: |
          mkdir -p dist/thin-wrap
          cp config.json dist/thin-wrap/config.json

      - name: Package macOS arm64
        run: |
          cd dist
          zip -r ../thin-wrap-Darwin-arm64.zip thin-wrap

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: thin-wrap-Darwin-arm64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --console --name thin-wrap --collect-submodules rich._unicode_data thin_wrap.py

      - name: Include sample config.json
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist\thin-wrap -Force | Out-Null
          Copy-Item -Path config.json -Destination dist\thin-wrap\config.json -Force

      - name: Package Windows x86_64
        shell: powershell
        run: |
          cd dist
          Compress-Archive -Path thin-wrap -DestinationPath ..\thin-wrap-Windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: thin-wrap-Windows-x86_64.zip

  release:
    needs: [build-linux, build-macos-intel, build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-x86_64/thin-wrap-Linux-x86_64.zip
            macos-x86_64/thin-wrap-Darwin-x86_64.zip
            macos-arm64/thin-wrap-Darwin-arm64.zip
            windows-x86_64/thin-wrap-Windows-x86_64.zip
          fail_on_unmatched_files: true
          generate_release_notes: true